<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayris</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{

    background: radial-gradient(circle at top, #212121, #0a0a0a);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100dvh;
    color:white;

    perspective:1200px;

}

.chat-container{

    position:relative;

    width:90vw;
    height:90vh;

    min-width:500px;
    min-height:500px;

    background:#111;

    border:1px solid #444;

    display:flex;
    flex-direction:column;

    overflow:hidden;

    border-radius:20px;

    box-shadow:
    0 0 20px rgba(255,255,255,0.05),
    0 0 60px rgba(0,0,0,0.8);

    transition:transform 0.15s ease-out;

    transform-style:preserve-3d;

}

/* COBRA DE LUZ */

.chat-container::before{

    content:"";

    position:absolute;

    top:-2px;
    left:-2px;
    right:-2px;
    bottom:-2px;

    border-radius:22px;

    background:conic-gradient(
        from 0deg,
        transparent,
        transparent,
        red,
        rgb(168,109,0),
        yellow,
        red,
        transparent,
        transparent
    );

    animation:snakeBorder 10s linear infinite;

    z-index:0;

}

.chat-container::after{

    content:"";

    position:absolute;

    inset:2px;

    background:#111;

    border-radius:20px;

    z-index:1;

}

.chat-container > *{
    position:relative;
    z-index:2;
}

@keyframes snakeBorder{

    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}

}

.chat-header{

    background:black;
    color:white;

    padding:10px;

    text-align:center;

    font-size:0.75rem;

    font-weight:bold;

    text-transform:uppercase;

    letter-spacing:3px;

}

.chat-box{

    flex:1;

    padding:12px;

    overflow-y:auto;

    display:flex;

    flex-direction:column;

    gap:8px;

}

.chat-box::-webkit-scrollbar{
    width:4px;
}

.chat-box::-webkit-scrollbar-thumb{
    background:#444;
    border-radius:10px;
}

.message{

    max-width:80%;

    padding:8px 12px;

    font-size:0.95rem;

    line-height:1.3;

    border:1px solid #333;

    border-radius:12px;

    word-wrap:break-word;

}

.user-message{

    background:#1c1c1c;

    color:white;

    align-self:flex-end;

    border-bottom-right-radius:2px;

}

.bot-message{

    background:#1c1c1c;

    color:white;

    align-self:flex-start;

    border-bottom-left-radius:2px;

    white-space:pre-wrap;
    font-family:monospace;

}

.chat-input-area{

    display:flex;

    padding:8px;

    border-top:1px solid #333;

    gap:5px;

}

.chat-input-area input{

    flex:1;

    padding:8px 12px;

    border:1px solid #444;

    background:#111;

    color:white;

    border-radius:15px;

    outline:none;

    font-size:0.8rem;

}

.chat-input-area button{

    background:red;

    color:black;

    border:none;

    width:60px;

    height:32px;

    cursor:pointer;

    font-weight:bold;

    font-size:1.25rem;

    border-radius:5px;

}

.chat-input-area button:hover{

    background:#ff2121;

}

.typing-cursor{

    display:inline-block;

    width:8px;

    background:white;

    margin-left:3px;

    animation:blink 1s infinite;

}

@keyframes blink{

    0%{opacity:1;}
    50%{opacity:0;}
    100%{opacity:1;}

}


/* ===========================
MODO CELULAR
=========================== */

@media (max-width:768px){

body{
    padding:10px;
}

.chat-container{

    width:95%;
    height:95%;

    min-width:unset;
    min-height:unset;

    border-radius:12px;

}

.chat-header{
    font-size:1.5rem;
    letter-spacing:2px;
}

.message{
    max-width:75%;
    font-size:1.2rem;
}

.chat-input-area input{
    font-size:1.5rem;
    padding:12px;
}

.chat-input-area button{

    background:red;

    color:black;

    border:none;

    width:60px;

    height:60px;

    cursor:pointer;

    font-weight:bold;

    font-size:2.5rem; /* aumenta o tamanho da seta */

    border-radius:5px;

}

}

</style>

</head>

<body>

<div class="chat-container">

<div class="chat-header">CAIXA DE TEXTO DA AYRIS</div>

<div id="chat-box" class="chat-box">

<div class="message bot-message">Ayris está funcionando! 😉</div>

</div>

<div class="chat-input-area">

<input type="text" id="user-input" placeholder=" Comando..." autocomplete="off">

<button type="button" id="send-btn">→</button>

</div>

</div>

<script>

console.log("FRONTEND CARREGOU");

const chatBox=document.getElementById("chat-box");
const userInput=document.getElementById("user-input");
const sendBtn=document.getElementById("send-btn");

const BOT_API_URL="https://buffy-unoutworn-solange.ngrok-free.dev/chat";

function scrollBottom(){
    chatBox.scrollTop=chatBox.scrollHeight;
}

function appendMessage(sender,text,id=null){

    const msg=document.createElement("div");

    msg.classList.add("message");
    msg.classList.add(sender==="user"?"user-message":"bot-message");

    if(id)msg.id=id;

    msg.textContent=text;

    chatBox.appendChild(msg);

    scrollBottom();

    return msg;

}

async function typeMessage(element,text){

    element.textContent="";

    const cursor=document.createElement("span");
    cursor.classList.add("typing-cursor");

    for(let i=0;i<text.length;i++){

        element.textContent+=text[i];

        if(i%2===0){
            await new Promise(r=>setTimeout(r,15));
        }

        scrollBottom();

    }

    element.appendChild(cursor);

    setTimeout(()=>cursor.remove(),500);

}
async function sendMessage(){

	const text = userInput.value.trim();

	if(!text) return;

	appendMessage("user", text);

	userInput.value = "";
	userInput.focus();

	const tempId = "loading-" + Date.now();

	appendMessage("bot", "Ayris está pensando...", tempId);

	try{

		const response = await fetch(BOT_API_URL, {
			method: "POST",
			headers: {"Content-Type":"application/json"},
			body: JSON.stringify({message:text})
		});

		if(!response.ok){
			throw new Error("Servidor respondeu erro");
		}

		const data = await response.json();

		const tempMsg = document.getElementById(tempId);

		if(tempMsg){
			await typeMessage(tempMsg, data.reply);
		}

	}catch(error){

		console.error(error);

		const tempMsg = document.getElementById(tempId);

		if(tempMsg){
			tempMsg.textContent = "Vish, deu erro paizão, espera um tanto até o servidor voltar novamente";
			tempMsg.style.color = "red";
		}

	}

}
sendBtn.addEventListener("click",sendMessage);

userInput.addEventListener("keydown",(e)=>{

    if(e.key==="Enter"){
        e.preventDefault();
        sendMessage();
    }

});


/* ===========================
EFEITO 3D (APENAS PC)
=========================== */

const container=document.querySelector(".chat-container");

const isMobile = window.innerWidth <= 768 || 'ontouchstart' in window;

if(!isMobile){

document.addEventListener("mousemove",(e)=>{

    const rect=container.getBoundingClientRect();

    const centerX=rect.left+rect.width/2;
    const centerY=rect.top+rect.height/2;

    const mouseX=e.clientX-centerX;
    const mouseY=e.clientY-centerY;

    const rotateX=(-mouseY/rect.height);
    const rotateY=(mouseX/rect.width);

    container.style.transform=
    `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

});

document.addEventListener("mouseleave",()=>{
    container.style.transform="rotateX(0) rotateY(0)";
});

}

</script>

</body>
</html>
