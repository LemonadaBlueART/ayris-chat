<script>

const chatBox = document.getElementById("chat-box");
const userInput = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");
const BOT_API_URL = "https://buffy-unoutworn-solange.ngrok-free.dev/chat";

let botFalando = false;

// Detecta se é dispositivo móvel
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || (window.innerWidth <= 768);

function scrollBottom() {
	chatBox.scrollTop = chatBox.scrollHeight;
}

function appendMessage(sender, text, id = null) {
	const msg = document.createElement("div");
	msg.classList.add("message");
	msg.classList.add(sender === "user" ? "user-message" : "bot-message");
	if (id) msg.id = id;
	msg.textContent = text;
	chatBox.appendChild(msg);
	scrollBottom();
	return msg;
}

async function sendMessage() {

	// BLOQUEIA ENVIO ENQUANTO IA RESPONDE
	if (botFalando) return;

	const text = userInput.value.trim();
	if (!text) return;

	botFalando = true;

	appendMessage("user", text);
	userInput.value = "";
	userInput.style.height = "40px";
	userInput.focus();

	const tempId = "loading-" + Date.now();
	appendMessage("bot", "...", tempId);

	try {

		const response = await fetch(BOT_API_URL, {
			method: "POST",
			headers: {
				"Content-Type": "application/json",
				"ngrok-skip-browser-warning": "true"
			},
			body: JSON.stringify({ message: text })
		});

		if (!response.ok) throw new Error("Erro na rede");

		const reader = response.body.getReader();
		const decoder = new TextDecoder();
		const tempMsg = document.getElementById(tempId);

		tempMsg.textContent = "";

		while (true) {

			const { done, value } = await reader.read();
			if (done) break;

			const chunk = decoder.decode(value, { stream: true });

			const span = document.createElement("span");
			span.classList.add("fade-in-token");

			const cleanChunk = chunk.replace(/\u200B/g, "");

			span.innerHTML = cleanChunk
				.replace(/\r\n|\r|\n/g, "<br>")
				.replace(/(\d+\.)/g, "<br>$1")
				.replace(/(<br>)+/g, "<br>");

			tempMsg.appendChild(span);

			scrollBottom();
		}

		botFalando = false;

	} catch (error) {

		console.error(error);

		const tempMsg = document.getElementById(tempId);

		if (tempMsg) {
			tempMsg.textContent = "Vish, deu erro paizão, o servidor caiu.";
			tempMsg.style.color = "red";
		}

		botFalando = false;
	}
}

/* ENTER PARA ENVIAR */

userInput.addEventListener("keydown", (e) => {

	if (botFalando) {
		e.preventDefault();
		return;
	}

	if (e.key === "Enter") {

		if (isMobile) return;

		if (!e.shiftKey) {
			e.preventDefault();
			sendMessage();
		}
	}
});

/* AUTO ALTURA INPUT */

userInput.addEventListener("input", function () {
	this.style.height = "auto";
	this.style.height = this.scrollHeight + "px";
});

/* DIGITAR EM QUALQUER LUGAR DA PÁGINA */

document.addEventListener("keydown", (e) => {

	if (botFalando) return;

	// se já está digitando no input, não faz nada
	if (document.activeElement === userInput) return;

	// caracteres normais
	if (e.key.length === 1) {
		userInput.focus();
		userInput.value += e.key;
	}

	// backspace
	if (e.key === "Backspace") {
		userInput.focus();
		userInput.value = userInput.value.slice(0, -1);
	}

	userInput.dispatchEvent(new Event("input"));
});

sendBtn.addEventListener("click", sendMessage);

/* INTRO CONTROLE */

const introTitle = document.getElementById("intro-title");
const introLoader = document.getElementById("intro-loader");
const introScreen = document.getElementById("intro-screen");

setTimeout(() => {
	introTitle.style.display = "none";
	introLoader.style.opacity = "1";
}, 3000);

setTimeout(() => { introScreen.style.opacity = "0"; }, 6000);
setTimeout(() => { introScreen.style.display = "none"; }, 7000);

/* EFEITO 3D */

const container = document.querySelector(".chat-container");

if (!isMobile) {

	document.addEventListener("mousemove", (e) => {

		const rect = container.getBoundingClientRect();

		const rotateX = (-(e.clientY - (rect.top + rect.height / 2)) / rect.height) * 2;
		const rotateY = ((e.clientX - (rect.left + rect.width / 2)) / rect.width) * 2;

		container.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg}`;
	});

	document.addEventListener("mouseleave", () => {
		container.style.transform = "rotateX(0) rotateY(0)";
	});
}

</script>
