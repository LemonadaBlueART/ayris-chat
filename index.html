<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ayris</title>

	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
		}

		body {
			background: radial-gradient(circle at top, #212121, #0a0a0a);
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100dvh;
			color: white;
			perspective: 1200px;
			overflow: hidden;
		}

		/* ===========================
		INTRO
		=========================== */
		#intro-screen {
			position: fixed;
			inset: 0;
			background: black;
			display: flex;
			justify-content: center;
			align-items: center;
			flex-direction: column;
			z-index: 99999;
			transition: opacity 1s ease;
		}

		#intro-title {
			font-size: 100px;
			letter-spacing: 12px;
			opacity: 0;
			animation: introFade 3s forwards;
			text-align: center;
		}

		#intro-loader {
			margin-top: 40px;
			width: 60px;
			height: 60px;
			border: 6px solid transparent;
			border-top: 6px solid white;
			border-radius: 50%;
			animation: spinLoader 1s linear infinite;
			opacity: 0;
		}
        /* Animação de Fade In para os tokens */
        .fade-in-token {
            opacity: 0;
            animation: fadeIn 0.4s ease forwards;
            display: inline-block;
            white-space: pre-wrap; /* Mantém espaços e quebras de linha */
        }

        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: translateY(2px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

		@keyframes introFade {
			0% { opacity: 0; }
			30% { opacity: 1; }
			70% { opacity: 1; }
			100% { opacity: 0; }
		}

		@keyframes spinLoader {
			from { transform: rotate(0deg); }
			to { transform: rotate(360deg); }
		}

		/* ===========================
		CHAT CONTAINER
		=========================== */
		.chat-container {
			position: relative;
			width: 90vw;
			height: 90vh;
			min-width: 500px;
			min-height: 500px;
			background: #111;
			border: 1px solid #444;
			display: flex;
			flex-direction: column;
			overflow: hidden;
			border-radius: 20px;
			box-shadow: 0 0 20px rgba(255, 255, 255, 0.05), 0 0 60px rgba(0, 0, 0, 0.8);
			transition: transform 0.15s ease-out;
			transform-style: preserve-3d;
		}

		/* COBRA DE LUZ */
		.chat-container::before {
			content: "";
			position: absolute;
			top: -2px; left: -2px; right: -2px; bottom: -2px;
			border-radius: 22px;
			background: conic-gradient(from 0deg, transparent, transparent, red, rgb(168,109,0), yellow, red, transparent, transparent);
			animation: snakeBorder 10s linear infinite;
			z-index: 0;
		}

		.chat-container::after {
			content: "";
			position: absolute;
			inset: 2px;
			background: #111;
			border-radius: 20px;
			z-index: 1;
		}

		.chat-container > * {
			position: relative;
			z-index: 2;
		}

		@keyframes snakeBorder {
			0% { transform: rotate(0deg); }
			100% { transform: rotate(360deg); }
		}

		.chat-header {
			background: black;
			color: #FFB6C1 ;
			padding: 10px;
			text-align: center;
			font-size: 1.5rem;
			font-weight: bold;
			text-transform: uppercase;
			letter-spacing: 3px;
		}

		.chat-box {
			flex: 1;
			padding: 12px;
			overflow-y: auto;
			display: flex;
			flex-direction: column;
			gap: 8px;
		}

		.chat-box::-webkit-scrollbar { width: 4px; }
		.chat-box::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            font-size: 0.95rem;
            line-height: 1.4;
            border: 1px solid #333;
            border-radius: 15px;

            word-wrap: break-word;
        }

		.user-message {
			background: #1c1c1c;
			color: white;
			align-self: flex-end;
			border-bottom-right-radius: 2px;
		}

        .bot-message {
            background: #1c1c1c;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
			
		    white-space: pre-line; /* respeita quebras de linha */
		    word-break: break-word;
		    line-height: 1.5em;    /* espaçamento mais confortável */
        }

		.chat-input-area {
			display: flex;
			padding: 10px;
			border-top: 1px solid #333;
			gap: 8px;
			align-items: flex-end;
		}

		.chat-input-area textarea {
			flex: 1;
			padding: 10px 15px;
			border: 1px solid #444;
			background: #111;
			color: white;
			border-radius: 15px;
			outline: none;
			font-size: 0.9rem;
			resize: none;
			min-height: 40px;
			max-height: 150px;
			overflow-y: auto;
		}

		.chat-input-area button {
			background: red;
			color: black;
			border: none;
			width: 50px;
			height: 40px;
			cursor: pointer;
			font-weight: bold;
			font-size: 1.2rem;
			border-radius: 10px;
			transition: background 0.2s;
			display: flex;
			justify-content: center;
			align-items: center;
		}

		.chat-input-area button:hover {
			background: #ff2121;
		}

		.typing-cursor {
			display: inline-block;
			width: 8px;
			background: white;
			margin-left: 3px;
			animation: blink 1s infinite;
		}

		@keyframes blink {
			0%, 100% { opacity: 1; }
			50% { opacity: 0; }
		}

		/* ===========================
		MOBILE ADJUSTS
		=========================== */
		@media (max-width: 768px) {
			.chat-container {
				width: 98vw;
				height: 98vh;
				min-width: unset;
				min-height: unset;
			}

			#intro-title {text-align: center; font-size: 30px; letter-spacing: 5px; }

			.message { max-width: 75%; font-size: 1.5rem; }

			.chat-input-area textarea { font-size:4rem; }

			.chat-input-area button {
				width: 110px;
				height: 100px;
			}
		}
	</style>
</head>
<body>

	<div id="intro-screen">
		<div id="intro-title">🥀🌺🌸😎🕶️Ayris🕶️😎🌸🌺🥀</div>
		<div id="intro-loader"></div>
	</div>

	<div class="chat-container">
		<div class="chat-header">CAIXA DE TEXTO DA AYRIS</div>
		
		<div id="chat-box" class="chat-box">
			<div class="message bot-message">Ayris está funcionando! 😉</div>
		</div>

		<div class="chat-input-area">
			<textarea id="user-input" placeholder="..." autocomplete="off" rows="1"></textarea>
			<button type="button" id="send-btn">→</button>
		</div>
	</div>

	<script>
		const chatBox = document.getElementById("chat-box");
		const userInput = document.getElementById("user-input");
		const sendBtn = document.getElementById("send-btn");
		const BOT_API_URL = "https://buffy-unoutworn-solange.ngrok-free.dev/chat";

		// Detecta se é dispositivo móvel
		const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || (window.innerWidth <= 768);

		function scrollBottom() {
			chatBox.scrollTop = chatBox.scrollHeight;
		}

		function appendMessage(sender, text, id = null) {
			const msg = document.createElement("div");
			msg.classList.add("message");
			msg.classList.add(sender === "user" ? "user-message" : "bot-message");
			if (id) msg.id = id;
			msg.textContent = text;
			chatBox.appendChild(msg);
			scrollBottom();
			return msg;
		}

		async function typeMessage(element, text) {
			element.textContent = "";
			const cursor = document.createElement("span");
			cursor.classList.add("typing-cursor");

			for (let i = 0; i < text.length; i++) {
				element.innerHTML += text[i] === "\n" ? "<br>" : text[i];
				if (i % 2 === 0) await new Promise(r => setTimeout(r, 15));
				scrollBottom();
			}
			element.appendChild(cursor);
			setTimeout(() => cursor.remove(), 500);
		}

		async function sendMessage() {
			const text = userInput.value.trim();
			if (!text) return;

			appendMessage("user", text);
			userInput.value = "";
			userInput.style.height = "40px"; // Reset altura
			userInput.focus();

			const tempId = "loading-" + Date.now();
			appendMessage("bot", "...", tempId);
            
            try {
                const response = await fetch(BOT_API_URL, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "ngrok-skip-browser-warning": "true" // Pula o aviso do ngrok
                    },
                    body: JSON.stringify({ message: text })
                });

                if (!response.ok) throw new Error("Erro na rede");

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                const tempMsg = document.getElementById(tempId);

                // ... dentro do try, após o const tempMsg = document.getElementById(tempId);
                tempMsg.textContent = ""; // Limpa o "pensando..."

                let fullText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    
                    // Criamos um span para o efeito de fade
                    const span = document.createElement("span");
                    span.classList.add("fade-in-token");
                
					const cleanChunk = chunk.replace(/\u200B/g, ""); // remove caracteres invisíveis
					span.innerHTML = cleanChunk
					    .replace(/\r\n|\r|\n/g, "<br>")  // padroniza todas quebras de linha
					    .replace(/(\d+\.)/g, "<br>$1")
					    .replace(/(<br>)+/g, "<br>");   // evita múltiplos <br> seguidos
                    
                    tempMsg.appendChild(span);
                    fullText += chunk;

                    scrollBottom();
                }
            } catch (error) {
                console.error(error); // Ajuda a debuggar no console do navegador
                const tempMsg = document.getElementById(tempId);
                if (tempMsg) {
                    tempMsg.textContent = "Vish, deu erro paizão, o servidor caiu.";
                    tempMsg.style.color = "red";
                }
            }
		}

		// Lógica de envio e quebra de linha
        userInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                if (isMobile) {
                    // No mobile, deixamos o comportamento padrão de pular linha
                    // mas garantimos que não envie o formulário
                    return; 
                } else {
                    // No PC: Enter envia, Shift+Enter pula linha
                    if (!e.shiftKey) {
                        e.preventDefault(); // EVITA que o navegador tente "submeter"
                        sendMessage();
                    }
                }
            }
        });

		// Ajuste automático da altura da textarea conforme digita
		userInput.addEventListener("input", function() {
			this.style.height = "auto";
			this.style.height = (this.scrollHeight) + "px";
		});

		sendBtn.addEventListener("click", sendMessage);

		/* INTRO CONTROLE */
		const introTitle = document.getElementById("intro-title");
		const introLoader = document.getElementById("intro-loader");
		const introScreen = document.getElementById("intro-screen");

		setTimeout(() => {
			introTitle.style.display = "none";
			introLoader.style.opacity = "1";
		}, 3000);

		setTimeout(() => { introScreen.style.opacity = "0"; }, 6000);
		setTimeout(() => { introScreen.style.display = "none"; }, 7000);

		/* EFEITO 3D (Apenas Desktop) */
		const container = document.querySelector(".chat-container");
		if (!isMobile) {
			document.addEventListener("mousemove", (e) => {
				const rect = container.getBoundingClientRect();
				const rotateX = (-(e.clientY - (rect.top + rect.height/2)) / rect.height) * 2;
				const rotateY = ((e.clientX - (rect.left + rect.width/2)) / rect.width) * 2;
				container.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
			});
			document.addEventListener("mouseleave", () => {
				container.style.transform = "rotateX(0) rotateY(0)";
			});
		}
	</script>

</body>
</html>
