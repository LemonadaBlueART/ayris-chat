<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/png" href="morcega.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayris</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #212121, #0a0a0a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            color: white;
            perspective: 1200px;
            overflow: hidden;
        }

        /* Estilização para o Markdown renderizado */
        .bot-message p { margin-bottom: 8px; }
        .bot-message p:last-child { margin-bottom: 0; }
        .bot-message pre { margin: 10px 0; font-size: 0.85rem; }
        
        pre {
            background: #0d0d0d;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid #333;
        }

        code {
            background: #222;
            padding: 2px 4px;
            border-radius: 4px;
            color: #ff7b7b;
        }

        /* INTRO */
        #intro-screen {
            position: fixed;
            inset: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 99999;
            transition: opacity 1s ease;
        }

        #intro-title {
            font-size: 50px; /* Reduzi um pouco para não quebrar em telas médias */
            letter-spacing: 8px;
            opacity: 0;
            animation: introFade 3s forwards;
            text-align: center;
        }

        #intro-loader {
            margin-top: 40px;
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spinLoader 1s linear infinite;
            opacity: 0;
        }

        .thinking-dots {
            display: inline-flex;
            gap: 4px;
        }

        .thinking-dots span {
            opacity: 0.2;
            animation: thinkingFade 1.5s infinite;
        }

        .thinking-dots span:nth-child(2) { animation-delay: 0.3s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.6s; }

        @keyframes thinkingFade {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        @keyframes introFade {
            0% { opacity: 0; }
            30% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes spinLoader {
            to { transform: rotate(360deg); }
        }

        /* CHAT CONTAINER */
        .chat-container {
            position: relative;
            width: 90vw;
            height: 90vh;
            max-width: 1000px;
            background: #111;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            transition: transform 0.2s ease-out;
            transform-style: preserve-3d;
        }

        .chat-container::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, transparent, red, orange, yellow, red, transparent, transparent);
            animation: snakeBorder 6s linear infinite;
            z-index: 0;
        }

        .chat-container::after {
            content: "";
            position: absolute;
            inset: 2px;
            background: #111;
            border-radius: 19px;
            z-index: 1;
        }

        .chat-container > * { position: relative; z-index: 2; }

        @keyframes snakeBorder {
            100% { transform: rotate(360deg); }
        }

        .chat-header {
            background: rgba(0,0,0,0.8);
            color: #FFB6C1;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 3px;
            border-bottom: 1px solid #333;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .chat-box::-webkit-scrollbar { width: 5px; }
        .chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            font-size: 0.95rem;
            line-height: 1.5;
            border-radius: 18px;
            word-wrap: break-word;
            animation: msgPop 0.3s ease;
        }

        @keyframes msgPop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .user-message {
            background: #222;
            color: #fff;
            align-self: flex-end;
            border: 1px solid #444;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            background: #1a1a1a;
            color: #eee;
            align-self: flex-start;
            border: 1px solid #333;
            border-bottom-left-radius: 4px;
        }
        /* Estilização das Tabelas no Chat */
        .bot-message table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 0.9rem;
            background-color: #111;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
            display: block;
            overflow-x: auto;
        }
        
        .bot-message th {
            background-color: #222;
            color: #FFB6C1; /* Cor rosa do seu tema */
            font-weight: bold;
            padding: 10px;
            text-align: left;
            border-bottom: 2px solid #333;
        }
        
        .bot-message td {
            padding: 10px;
            border-bottom: 1px solid #222;
            color: #ccc;
            vertical-align: top;
        }
        
        .bot-message tr:last-child td {
            border-bottom: none;
        }
        
        .bot-message tr:nth-child(even) {
            background-color: #161616; /* Efeito zebra para leitura fácil */
        }
        
        /* Garante que a tabela não quebre o layout no mobile */
        .bot-message {
            overflow-x: auto;
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            background: #0d0d0d;
            border-top: 1px solid #333;
            gap: 10px;
            align-items: flex-end;
        }

        .chat-input-area textarea {
            flex: 1;
            padding: 12px;
            background: #181818;
            border: 1px solid #333;
            color: white;
            border-radius: 12px;
            outline: none;
            font-size: 0.95rem;
            resize: none;
            max-height: 150px;
        }

        .chat-input-area button {
            background: #ff0000;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            cursor: pointer;
            border-radius: 12px;
            font-size: 1.2rem;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .chat-input-area button:hover { background: #b30000; transform: scale(1.05); }

        /* MOBILE FIXES */
        @media (max-width: 768px) {
            .chat-container { width: 100vw; height: 100dvh; border-radius: 0; }
            .chat-container::after { border-radius: 0; }
            #intro-title { font-size: 32px; }
            .message { max-width: 90%; font-size: 1rem; }
            .chat-input-area textarea { font-size: 1rem; }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <div id="intro-screen">
        <div id="intro-title">🥀 Ayris 🥀</div>
        <div id="intro-loader"></div>
    </div>

    <div class="chat-container">
        <div class="chat-header">AYRIS SYSTEM</div>
        <div id="chat-box" class="chat-box">
            <div class="message bot-message">Ayris está pronta. Como posso ajudar? 😉</div>
        </div>

        <div class="chat-input-area">
            <textarea id="user-input" placeholder="Digite uma mensagem..." rows="1"></textarea>
            <button type="button" id="send-btn">➔</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById("chat-box");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");
        const BOT_API_URL = "https://buffy-unoutworn-solange.ngrok-free.dev/chat";
        
        let botFalando = false;
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        function scrollBottom() { 
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' }); 
        }

        function appendMessage(sender, text, id = null) {
            const msg = document.createElement("div");
            msg.classList.add("message", sender === "user" ? "user-message" : "bot-message");
            if (id) msg.id = id;
            
            if (sender === "user") {
                msg.textContent = text;
            } else {
                msg.innerHTML = text; // Para o bot aceitar HTML/Marked
            }
            
            chatBox.appendChild(msg);
            scrollBottom();
            return msg;
        }

        async function sendMessage() {
            if (botFalando) return;
            const text = userInput.value.trim();
            if (!text) return;

            botFalando = true;
            appendMessage("user", text);
            
            // Reset input
            userInput.value = "";
            userInput.style.height = "45px";

            const tempId = "bot-" + Date.now();
            const botMsgElement = appendMessage("bot", `<span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span>`, tempId);

            try {
                const response = await fetch(BOT_API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });

                if (!response.ok) throw new Error("Servidor offline");

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = "";
                
                botMsgElement.innerHTML = ""; // Limpa os pontinhos

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    fullText += decoder.decode(value, { stream: true });
                    // Renderiza markdown em tempo real
                    botMsgElement.innerHTML = marked.parse(fullText);
                    scrollBottom();
                }

            } catch (error) {
                console.error(error);
                botMsgElement.innerHTML = "<span style='color: #ff4d4d;'>Erro: Não foi possível conectar ao servidor.</span>";
            } finally {
                botFalando = false;
            }
        }

        /* EVENTOS */
        sendBtn.addEventListener("click", sendMessage);

        userInput.addEventListener("keydown", e => {
            if (e.key === "Enter" && !e.shiftKey && !isMobile) {
                e.preventDefault();
                sendMessage();
            }
        });

        userInput.addEventListener("input", function() {
            this.style.height = "auto";
            this.style.height = (this.scrollHeight) + "px";
        });

        // Intro Logic
        window.addEventListener('load', () => {
            const introTitle = document.getElementById("intro-title");
            const introLoader = document.getElementById("intro-loader");
            const introScreen = document.getElementById("intro-screen");

            setTimeout(() => { 
                introTitle.style.display = "none"; 
                introLoader.style.opacity = "1"; 
            }, 3000);

            setTimeout(() => { 
                introScreen.style.opacity = "0"; 
                setTimeout(() => introScreen.style.display = "none", 1000);
            }, 5500);
        });

        /* EFEITO 3D */
        const container = document.querySelector(".chat-container");
        if (!isMobile) {
            document.addEventListener("mousemove", e => {
                const x = (window.innerWidth / 2 - e.pageX) / 50;
                const y = (window.innerHeight / 2 - e.pageY) / 50;
                container.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
            });
        }
    </script>

</body>
</html>
